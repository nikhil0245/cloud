<!DOCTYPE html>
<html>

<head>
    <title>Nikhil - Contact</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Trebuchet MS, sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background: #eef2ff;
        }

        /* SIDEBAR */

        .sidebar {
            width: 240px;
            background: #4f46e5;
            color: white;
            padding: 30px 20px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #6366f1;
        }

        /* MAIN AREA */

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* PROFILE CARD */

        .profile {
            background: white;
            padding: 40px;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0px 8px 22px rgba(0, 0, 0, 0.12);
            width: 350px;
        }

        .profile img {
            width: 170px;
            border-radius: 100px;
            margin-bottom: 15px;
        }

        .profile h2 {
            color: #4338ca;
            margin-bottom: 10px;
        }

        .email {
            font-weight: bold;
            color: #4f46e5;
        }

        /* FOOTER */

        footer {
            position: fixed;
            bottom: 0;
            left: 240px;
            right: 0;
            background: #4338ca;
            color: white;
            text-align: center;
            padding: 12px;
        }
    </style>
</head>

<body>

    <div class="sidebar">

        <h2>Cloud Panel</h2>

        <a href="index.html">Dashboard</a>
        <a href="contact.html">Contact Info</a>

    </div>


    <div class="main">

        <div class="profile">

            <img src="Nikhil.png">

            <h2>Nikhil Lakhera</h2>

            <p class="email">Email: nikhillakhera04@gmail.com</p>

        </div>

    </div>


    <footer>
        Back to Dashboard
    </footer>

</body>

</html>
